# Project Information
site_name: VATPAC Standard Operating Procedures
site_url: https://sops.vatpac.org
edit_uri: "" #removes edit button and icon
copyright: ""

# Configuration
theme:
  name: material
  custom_dir: overrides
  logo: assets/images/mini-logo.png
  font:
    text: Maven Pro
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.tooltips
    - content.tabs.link
  favicon: assets/images/mini-logo.png
  icon:
    repo: fontawesome/brands/github
    annotation: material/plus-circle
    annotation: material/minus-circle

# Plugins
plugins:
  - search:
      lang: en
  - glightbox    
  - awesome-pages
  - git-revision-date-localized:
      type: date
